<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transcript (original)</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="viewer">
    <span id="status" class="viewer-status" data-state="disconnected"></span>
    <div id="transcript" class="transcript viewer-transcript" aria-live="polite"></div>
    <button
      id="scroll-bottom"
      class="scroll-bottom-btn viewer-scroll-btn"
      aria-label="Scroll to latest"
      title="Scroll to latest"
    >
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path
          d="M6 9l6 6 6-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
    <script type="module" src="/js/source.js"></script>
  </body>
</html>
