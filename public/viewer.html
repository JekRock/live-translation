<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtitles</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="viewer">
    <span id="status" class="viewer-status" data-state="disconnected"></span>
    <button
      id="audio-toggle"
      class="audio-btn viewer-audio-btn"
      type="button"
      aria-pressed="false"
      title="Play the translated speech out loud"
    >
      <span class="audio-icon">
        <svg
          class="icon icon-off"
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M4 9v6h4l5 4V5L8 9H4z" />
          <path d="M17 9l5 6M22 9l-5 6" />
        </svg>
        <svg
          class="icon icon-on"
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M4 9v6h4l5 4V5L8 9H4z" />
          <path d="M16 8.5a5 5 0 010 7" />
          <path d="M18.7 6a9 9 0 010 12" />
        </svg>
      </span>
    </button>
    <div id="transcript" class="transcript viewer-transcript" aria-live="polite"></div>
    <button
      id="scroll-bottom"
      class="scroll-bottom-btn viewer-scroll-btn"
      aria-label="Scroll to latest"
      title="Scroll to latest"
    >
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path
          d="M6 9l6 6 6-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
    <script type="module" src="/js/viewer.js"></script>
  </body>
</html>
