# fly.toml app configuration file generated for live-translation-purple-snowflake-3081 on 2026-06-14T01:31:54+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'live-translation-purple-snowflake-3081'
primary_region = 'fra'

[build]

[env]
  HOST = '0.0.0.0'
  PORT = '3000'
  COOKIE_SECURE = 'true'
  DB_PATH = '/data/db/app.db'
  LOG_FILE = '/data/logs/app.log'
  TRANSCRIPT_DIR = '/data/transcripts'
  TARGET_LANGUAGE = 'en'
  INPUT_TRANSCRIPTION_MODEL = 'gpt-4o-transcribe'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
